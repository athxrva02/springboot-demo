# ── Server ────────────────────────────────────────────────────────────────────
server.port=8080

# ── H2 Persistent File Database ───────────────────────────────────────────────
# Stored at ./data/demodb.mv.db relative to the working directory
spring.datasource.url=jdbc:h2:file:./data/demodb;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Enable the H2 web console at http://localhost:8080/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=false

# ── JPA / Hibernate ───────────────────────────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
# update: applies schema changes without wiping existing data
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ── Actuator ──────────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# ── Application info (surfaced by /actuator/info) ─────────────────────────────
spring.application.name=demo
info.app.name=Spring Boot Demo
info.app.version=0.0.1-SNAPSHOT
